<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizah & Samie — Wedding Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Allura&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F3; --sage:#6E7D63; --sage-deep:#4E5A40; --sage-text:#414B36;
    --gold:#A8854A; --gold-light:#C2A363; --ink:#36402C; --line:rgba(168,133,74,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;scrollbar-width:none}
  html::-webkit-scrollbar{display:none}
  body{font-family:'Cormorant Garamond','Hoefler Text',Georgia,serif;color:var(--sage-text);-webkit-font-smoothing:antialiased;min-height:100vh;background:var(--paper)}

  .header{text-align:center;padding:52px 20px 32px}
  .header a{display:inline-block;font-style:italic;color:var(--sage);font-size:1rem;text-decoration:none;margin-bottom:28px;letter-spacing:.3px}
  .header a:hover{color:var(--gold)}
  .header h1{font-family:'Allura',cursive;color:var(--sage-deep);font-size:clamp(2.8rem,9vw,4.2rem);font-weight:400;line-height:1;margin-bottom:10px}
  .header p{font-size:1.05rem;color:var(--sage);font-style:italic}

  .divider{width:160px;height:22px;margin:24px auto 36px;display:block}

  /* Upload zone */
  .upload-wrap{max-width:480px;margin:0 auto 52px;padding:0 20px}
  .upload-btn{display:block;width:100%;background:var(--sage-deep);color:var(--paper);border:none;padding:18px;cursor:pointer;font-family:'Cormorant Garamond','Hoefler Text',Georgia,serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:4px;border-radius:2px;transition:background .25s,transform .2s;box-shadow:0 12px 26px -12px rgba(54,64,44,.8)}
  .upload-btn:hover{background:#3d4733;transform:translateY(-2px)}
  .upload-btn:disabled{opacity:.5;cursor:default;transform:none}
  #fileInput{display:none}
  .progress-wrap{margin-top:16px;display:none}
  .progress-bar-bg{height:3px;background:var(--line);border-radius:2px;overflow:hidden}
  .progress-bar{height:100%;width:0%;background:var(--gold);transition:width .3s}
  .status{margin-top:10px;font-style:italic;color:var(--sage);font-size:.95rem;text-align:center}

  /* Gallery */
  .gallery-header{text-align:center;margin-bottom:24px;padding:0 20px}
  .gallery-header h2{font-family:'Cormorant Garamond',serif;font-size:1rem;text-transform:uppercase;letter-spacing:3px;color:var(--gold);font-weight:600}
  .count{font-size:.85rem;color:var(--sage);font-style:italic;margin-top:4px}

  .grid{columns:2;column-gap:8px;padding:0 12px 60px;max-width:900px;margin:0 auto}
  @media(min-width:560px){.grid{columns:3}}
  @media(min-width:900px){.grid{columns:4}}

  .grid-item{break-inside:avoid;margin-bottom:8px;border-radius:3px;overflow:hidden;cursor:pointer;position:relative}
  .grid-item img{width:100%;display:block;transition:transform .3s;border-radius:3px}
  .grid-item:hover img{transform:scale(1.03)}
  .delete-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.82);border:none;color:#fff;padding:6px 12px;border-radius:14px;font-size:.82rem;font-weight:600;letter-spacing:.6px;cursor:pointer;display:flex;align-items:center;gap:5px;z-index:2;font-family:'Cormorant Garamond',Georgia,serif;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .delete-btn:hover{background:rgba(180,60,40,.95)}

  .empty-state{text-align:center;padding:60px 20px;color:var(--sage);font-style:italic;font-size:1.1rem}

  /* Lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(30,28,24,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .lightbox.show{display:flex}
  .lightbox img{max-width:100%;max-height:90vh;border-radius:3px;object-fit:contain}
  .lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;line-height:1;opacity:.7}
  .lightbox-close:hover{opacity:1}

  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .grid-item{animation:fadeIn .5s ease both}
</style>
</head>
<body>

<div class="header">
  <a href="/">← Back to Invitation</a>
  <h1>Our Wedding Photos</h1>
  <p>Share your moments from the celebration</p>
</div>

<svg class="divider" viewBox="0 0 160 22" fill="none">
  <path d="M8 11 H62" stroke="#A8854A" stroke-width="1"/>
  <path d="M98 11 H152" stroke="#A8854A" stroke-width="1"/>
  <path d="M80 3 C75 8 75 14 80 19 C85 14 85 8 80 3Z" fill="#A8854A"/>
  <circle cx="68" cy="11" r="1.5" fill="#A8854A"/>
  <circle cx="92" cy="11" r="1.5" fill="#A8854A"/>
</svg>

<div class="upload-wrap">
  <input type="file" id="fileInput" accept="image/*" multiple>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload a Photo</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status" id="status"></div>
  </div>
</div>

<div class="gallery-header">
  <h2>From the Celebration</h2>
  <div class="count" id="count"></div>
</div>

<div class="grid" id="grid">
  <div class="empty-state" id="emptyState" style="display:none">Photos will appear here as guests share them</div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const SUPABASE_URL = 'https://byvjwxnhcqjhkuqofenv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dmp3eG5oY3FqaGt1cW9mZW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjc4OTcsImV4cCI6MjA5NzkwMzg5N30.QscMJ4dclX-u66ckAUFAyL7NQiCvVjtxK3mSAX9AR4M';
const BUCKET = 'wedding-photos';

/* ---- compress image in browser ---- */
function compress(file, maxW=1600, quality=0.82){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---- upload ---- */
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', async () => {
  const files = Array.from(fileInput.files);
  if(!files.length) return;

  const btn = document.querySelector('.upload-btn');
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  const status = document.getElementById('status');

  btn.disabled = true;
  wrap.style.display = 'block';

  for(let i = 0; i < files.length; i++){
    const file = files[i];
    status.textContent = `Compressing ${i+1} of ${files.length}…`;
    bar.style.width = ((i / files.length) * 50) + '%';

    const blob = await compress(file);
    const filename = `${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;

    status.textContent = `Uploading ${i+1} of ${files.length}…`;

    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'image/jpeg',
      },
      body: blob
    });

    if(!res.ok){
      status.textContent = 'Upload failed. Please try again.';
      btn.disabled = false;
      return;
    }

    myUploads.add(filename);
    saveMyUploads();
    bar.style.width = (((i+1) / files.length) * 100) + '%';
  }

  status.textContent = 'Shared! Thank you for capturing this moment.';
  setTimeout(() => { wrap.style.display='none'; bar.style.width='0%'; }, 3000);
  btn.disabled = false;
  fileInput.value = '';
  loadPhotos();
});

/* ---- session uploads (for delete ownership) ---- */
const myUploads = new Set(JSON.parse(localStorage.getItem('myUploads') || '[]'));
function saveMyUploads(){ localStorage.setItem('myUploads', JSON.stringify([...myUploads])); }

async function deletePhoto(filename, item){
  if(!confirm('Remove this photo?')) return;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${filename}`, {
    method: 'DELETE',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    }
  });
  if(res.ok){
    item.remove();
    myUploads.delete(filename);
    saveMyUploads();
    knownFiles.delete(filename);
    const count = document.querySelectorAll('.grid-item').length;
    document.getElementById('count').textContent = count ? `${count} photo${count===1?'':'s'} shared` : '';
    if(!count) document.getElementById('emptyState').style.display = 'block';
  }
}

/* ---- load gallery ---- */
let knownFiles = new Set();

async function loadPhotos(){
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ limit: 500, offset: 0, prefix: '', sortBy: { column: 'created_at', order: 'desc' } })
  });
  if(!res.ok) return;
  const files = await res.json();
  if(!Array.isArray(files) || files.length === 0){
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('count').textContent = '';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('count').textContent = `${files.length} photo${files.length===1?'':'s'} shared`;

  const grid = document.getElementById('grid');
  files.forEach(f => {
    if(knownFiles.has(f.name)) return;
    knownFiles.add(f.name);

    const url = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${f.name}`;
    const item = document.createElement('div');
    item.className = 'grid-item';
    const isOwn = myUploads.has(f.name);
    item.innerHTML = `<img src="${url}" alt="Wedding photo" loading="lazy">${isOwn ? `<button class="delete-btn" title="Remove photo">🗑 Remove</button>` : ''}`;
    const img = item.querySelector('img');
    img.onerror = () => {
      item.remove();
      knownFiles.delete(f.name);
      const count = document.querySelectorAll('.grid-item').length;
      document.getElementById('count').textContent = count ? `${count} photo${count===1?'':'s'} shared` : '';
      if(!count){ document.getElementById('emptyState').style.display = 'block'; document.getElementById('count').textContent = ''; }
    };
    img.onclick = () => openLightbox(url);
    if(isOwn) item.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); deletePhoto(f.name, item); };
    grid.insertBefore(item, grid.firstChild);
  });
}

/* ---- lightbox ---- */
function openLightbox(url){
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
}
document.getElementById('lightbox').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeLightbox();
});

/* ---- init + poll ---- */
loadPhotos();
setInterval(loadPhotos, 30000);
</script>
</body>
</html>
