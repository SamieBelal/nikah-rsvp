<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Notes — Samie & Faizah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Allura&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F3; --sage:#6E7D63; --sage-deep:#4E5A40; --sage-text:#414B36;
    --gold:#A8854A; --line:rgba(168,133,74,.45); --ink:#36402C;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scrollbar-width:none}
  html::-webkit-scrollbar{display:none}
  body{font-family:'Cormorant Garamond','Hoefler Text',Georgia,serif;color:var(--sage-text);background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased}

  .header{text-align:center;padding:48px 20px 28px}
  .header h1{font-family:'Allura',cursive;color:var(--sage-deep);font-size:clamp(2.4rem,8vw,3.6rem);font-weight:400;line-height:1;margin-bottom:8px}
  .header p{font-size:.95rem;color:var(--sage);font-style:italic}
  .count{font-size:.85rem;color:var(--sage);font-style:italic;margin-top:4px}

  .list{max-width:560px;margin:0 auto;padding:0 20px 60px}
  .note{background:#fff;border-radius:4px;box-shadow:0 2px 12px rgba(54,64,44,.08);border:1px solid rgba(168,133,74,.15);padding:18px 20px;margin-bottom:14px}
  .note-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .note-name{font-weight:600;color:var(--ink);font-size:1.08rem}
  .note-meta{font-size:.82rem;color:var(--sage);font-style:italic}
  .note audio{width:100%;height:36px}

  .empty{text-align:center;padding:80px 20px;color:var(--sage);font-style:italic;font-size:1.1rem}
  .loading{text-align:center;padding:80px 20px;color:var(--sage);font-style:italic}
</style>
</head>
<body>

<div class="header">
  <h1>Voice Notes</h1>
  <p>Messages from our loved ones</p>
  <p class="count" id="count"></p>
</div>

<div class="list" id="list">
  <p class="loading" id="loading">Loading voice notes&hellip;</p>
</div>

<script>
const SB_URL='https://byvjwxnhcqjhkuqofenv.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dmp3eG5oY3FqaGt1cW9mZW52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjc4OTcsImV4cCI6MjA5NzkwMzg5N30.QscMJ4dclX-u66ckAUFAyL7NQiCvVjtxK3mSAX9AR4M';

function fmtDuration(s){return '0:'+String(s).padStart(2,'0');}
function fmtDate(d){var dt=new Date(d);return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

async function load(){
  try{
    var res=await fetch(SB_URL+'/rest/v1/voice_notes?order=created_at.desc',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!res.ok) throw new Error(res.status);
    var notes=await res.json();
    var list=document.getElementById('list');
    document.getElementById('loading').remove();

    if(!notes.length){
      list.innerHTML='<p class="empty">No voice notes yet.</p>';
      return;
    }

    document.getElementById('count').textContent=notes.length+' voice note'+(notes.length===1?'':'s');

    notes.forEach(function(n){
      var audioUrl=SB_URL+'/storage/v1/object/public/voice-notes/'+n.file_path;
      var div=document.createElement('div');
      div.className='note';
      div.innerHTML=
        '<div class="note-top">'+
          '<span class="note-name">'+n.name.replace(/</g,'&lt;')+'</span>'+
          '<span class="note-meta">'+fmtDuration(n.duration)+' &middot; '+fmtDate(n.created_at)+'</span>'+
        '</div>'+
        '<audio controls preload="none"><source src="'+audioUrl+'" type="'+(n.file_path.endsWith('.webm')?'audio/webm':'audio/mp4')+'"><source src="'+audioUrl+'" type="audio/mp4"><source src="'+audioUrl+'" type="audio/webm"></audio>';
      list.appendChild(div);
    });
  }catch(e){
    document.getElementById('loading').textContent='Failed to load voice notes.';
  }
}

load();
</script>
</body>
</html>
